server.port=8080
spring.application.name=API-GATEWAY

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT ? must be same secret as auth-service
jwt.secret=TalentTalkSuperSecretKeyForJWT2024MustBe32Chars!

# Enable Eureka based routing
spring.cloud.gateway.mvc.discovery.locator.enabled=true
spring.cloud.gateway.mvc.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.mvc.routes[1].id=auth-service-oauth
spring.cloud.gateway.mvc.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.mvc.routes[2].id=auth-service-oauth-login
spring.cloud.gateway.mvc.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/login/oauth2/**

spring.cloud.gateway.mvc.routes[3].id=student-service
spring.cloud.gateway.mvc.routes[3].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/student/**

spring.cloud.gateway.mvc.routes[4].id=job-service
spring.cloud.gateway.mvc.routes[4].uri=lb://JOB-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/job/**

spring.cloud.gateway.mvc.routes[5].id=communication-service
spring.cloud.gateway.mvc.routes[5].uri=lb://COMMUNICATION-SERVICE
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/email/**

spring.cloud.gateway.mvc.routes[6].id=communication-service-msg
spring.cloud.gateway.mvc.routes[6].uri=lb://COMMUNICATION-SERVICE
spring.cloud.gateway.mvc.routes[6].predicates[0]=Path=/message/**

spring.cloud.gateway.mvc.routes[7].id=payment-service
spring.cloud.gateway.mvc.routes[7].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.mvc.routes[7].predicates[0]=Path=/payment/**

spring.cloud.gateway.mvc.routes[8].id=admin-service
spring.cloud.gateway.mvc.routes[8].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.mvc.routes[8].predicates[0]=Path=/admin/**

spring.cloud.gateway.mvc.routes[9].id=company-service
spring.cloud.gateway.mvc.routes[9].uri=lb://COMPANY-SERVICE
spring.cloud.gateway.mvc.routes[9].predicates[0]=Path=/company/**

spring.cloud.gateway.mvc.routes[10].id=interview-service
spring.cloud.gateway.mvc.routes[10].uri=lb://INTERVIEW-SERVICE
spring.cloud.gateway.mvc.routes[10].predicates[0]=Path=/interview/**
